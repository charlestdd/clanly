<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clanly</title>
</head>

<body style="background:#313338;color:white;font-family:Arial;text-align:center;padding-top:100px">

<img id="avatar" width="100" style="border-radius:50%">

<h1 id="username"></h1>

<p id="email"></p>

<h2>Welcome to Clanly</h2>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyCf0ZGAMxo4t9NyezQVY5ghaViQK-pDsKQ",
authDomain:"clanly-ac9de.firebaseapp.com",
projectId:"clanly-ac9de",
storageBucket:"clanly-ac9de.firebasestorage.app",
messagingSenderId:"604527744111",
appId:"1:604527744111:web:f87ed6c3bd205e5ff7a99a"
};

initializeApp(firebaseConfig);

const auth=getAuth();
const db=getFirestore();

onAuthStateChanged(auth,async(user)=>{

if(!user){
window.location="index.html";
return;
}

const snap=
await getDoc(
doc(
db,
"users",
user.uid
)
);

const data=snap.data();

avatar.src=data.photoURL;
username.innerText=data.username;
email.innerText=data.email;

});

</script>

</body>
</html>
