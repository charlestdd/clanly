<!DOCTYPE html>
<html>

<head>
<title>Clanly Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:#313338;
color:white;

}

.container{

width:400px;

background:#1e1f22;

padding:35px;

border-radius:18px;

box-shadow:0px 8px 25px rgba(0,0,0,0.4);

text-align:center;

}

.logo{

font-size:35px;
font-weight:bold;
margin-bottom:10px;

}

.subtitle{

color:#b5bac1;
margin-bottom:30px;
font-size:14px;

}

button{

width:100%;
padding:14px;

border:none;
border-radius:8px;

background:#5865F2;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:translateY(-2px);

opacity:.95;

}

.small{

margin-top:18px;
font-size:12px;
color:#949ba4;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
Clanly
</div>

<div class="subtitle">
Communities, conversations, and chaos.
</div>

<button id="loginBtn">
Continue with Google
</button>

<div class="small">
Sign in to continue
</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyBuapWoAiZKhkNOfUos9ZuvzisS39YGs1o",
authDomain:"skibidilogin-bbf42.firebaseapp.com",
projectId:"skibidilogin-bbf42",
storageBucket:"skibidilogin-bbf42.firebasestorage.app",
messagingSenderId:"1008118855931",
appId:"1:1008118855931:web:fb7784385be188150d585e",
measurementId:"G-JJX8RGZ210"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth();
const db=getFirestore();

const provider=new GoogleAuthProvider();

document.getElementById("loginBtn")
.onclick=async()=>{

const result=
await signInWithPopup(
auth,
provider
);

const user=result.user;

const snap=
await getDoc(
doc(
db,
"users",
user.uid
)
);

if(
snap.exists()
&&
snap.data().username
){

window.location=
"skibidi.html";

}
else{

window.location=
"username.html";

}

};

</script>

</body>
</html>
