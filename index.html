<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clanly Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#313338;
color:white;
}

.card{
width:400px;
background:#1e1f22;
padding:35px;
border-radius:18px;
text-align:center;
}

.logo{
font-size:34px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
margin-bottom:30px;
color:#b5bac1;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#5865F2;
color:white;
font-size:16px;
cursor:pointer;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">
Clanly
</div>

<div class="subtitle">
Communities, conversations, and chaos.
</div>

<button id="loginBtn">
Continue with Google
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
GoogleAuthProvider,
signInWithPopup
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
getDoc
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCf0ZGAMxo4t9NyezQVY5ghaViQK-pDsKQ",
authDomain:"clanly-ac9de.firebaseapp.com",
projectId:"clanly-ac9de",
storageBucket:"clanly-ac9de.firebasestorage.app",
messagingSenderId:"604527744111",
appId:"1:604527744111:web:f87ed6c3bd205e5ff7a99a"

};

initializeApp(firebaseConfig);

const auth=getAuth();
const db=getFirestore();

const provider=new GoogleAuthProvider();

document.getElementById("loginBtn").onclick=async()=>{

const result=
await signInWithPopup(
auth,
provider
);

const user=result.user;

const snap=
await getDoc(
doc(
db,
"users",
user.uid
)
);

if(
snap.exists() &&
snap.data().username
){
window.location="clanly.html";
}
else{
window.location="username.html";
}

};

</script>

</body>
</html>
