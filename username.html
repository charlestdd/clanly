<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Create Username</title>

<style>
body{
background:#313338;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
margin:0;
}

.card{
width:420px;
background:#1e1f22;
padding:30px;
border-radius:18px;
text-align:center;
}

img{
width:80px;
height:80px;
border-radius:50%;
margin-bottom:10px;
}

input{
width:100%;
padding:12px;
background:#2b2d31;
border:none;
border-radius:8px;
color:white;
margin-top:15px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#5865F2;
border:none;
border-radius:8px;
color:white;
}

#error{
margin-top:8px;
color:#ed4245;
font-size:14px;
}
</style>

</head>
<body>

<div class="card">

<img id="avatar">

<h2>Create Username</h2>

<div id="email"></div>

<input
id="usernameInput"
placeholder="Username"
>

<div id="error"></div>

<button id="continueBtn">
Continue
</button>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {
getFirestore,
doc,
setDoc,
getDoc,
query,
collection,
where,
getDocs
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:"AIzaSyCf0ZGAMxo4t9NyezQVY5ghaViQK-pDsKQ",
authDomain:"clanly-ac9de.firebaseapp.com",
projectId:"clanly-ac9de",
storageBucket:"clanly-ac9de.firebasestorage.app",
messagingSenderId:"604527744111",
appId:"1:604527744111:web:f87ed6c3bd205e5ff7a99a"

};

initializeApp(firebaseConfig);

const auth = getAuth();
const db = getFirestore();

let currentUser;

const reserved = [

"admin",
"system",
"staff",
"support",
"official",
"clanly",
"discord",
"google",
"youtube",
"roblox",
"moderator",
"owner",
"developer",
"security",
"null",
"undefined"

];

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location = "index.html";
return;

}

currentUser = user;

avatar.src = user.photoURL;
email.innerText = user.email;

});

continueBtn.onclick = async()=>{

error.innerText = "";

const username =
usernameInput.value
.trim()
.toLowerCase();


// =======================
// FORMAT VALIDATION
// =======================

if(
!/^[a-z]{6,8}$/.test(username)
){

error.innerText =
"Use 6-8 lowercase letters only";

return;

}


// =======================
// RESERVED USERNAMES
// =======================

if(
reserved.includes(username)
){

error.innerText =
"Username unavailable";

return;

}


// =======================
// CHECK IF USER EXISTS
// =======================

const existingUser =
await getDoc(
doc(
db,
"users",
currentUser.uid
)
);

if(
existingUser.exists()
){

error.innerText =
"Account already created";

return;

}


// =======================
// CHECK USERNAME TAKEN
// =======================

const q = query(
collection(db,"users"),
where(
"usernameLower",
"==",
username
)
);

const result =
await getDocs(q);

if(!result.empty){

error.innerText =
"Username taken";

return;

}


// =======================
// CREATE USER
// =======================

await setDoc(
doc(db,"users",currentUser.uid),
{

email: currentUser.email,

username: username,

usernameLower: username,

photoURL: currentUser.photoURL,

usernameChanges: 0,

createdAt: Date.now(),

joinedServers: [],

serversCreated: 0

}
);


// =======================
// CLAIM USERNAME
// =======================

await setDoc(
doc(db,"usernames",username),
{
uid: currentUser.uid
}
);


window.location =
"clanly.html";

};

</script>


</script>

</body>
</html>
