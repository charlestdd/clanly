<!DOCTYPE html>
<html>

<head>
<title>Clanly - Create Username</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:#313338;
color:white;

}

.container{

width:420px;

background:#1e1f22;

padding:35px;

border-radius:18px;

box-shadow:0px 8px 25px rgba(0,0,0,.4);

text-align:center;

}

.avatar{

width:90px;
height:90px;

border-radius:50%;

margin-bottom:15px;

}

.title{

font-size:26px;
font-weight:bold;

margin-bottom:10px;

}

.email{

font-size:14px;
color:#949ba4;

margin-bottom:25px;

}

.input{

width:100%;

padding:14px;

border:none;
outline:none;

border-radius:8px;

background:#2b2d31;

color:white;

font-size:15px;

}

.error{

height:20px;

margin-top:8px;

font-size:13px;
color:#ed4245;

}

button{

margin-top:15px;

width:100%;
padding:14px;

border:none;
border-radius:8px;

background:#5865F2;

color:white;

font-size:16px;
font-weight:bold;

cursor:pointer;

opacity:.5;

}

button:disabled{

cursor:not-allowed;

}

button.enabled{

opacity:1;

}

</style>

</head>

<body>

<div class="container">

<img
id="avatar"
class="avatar"
>

<div class="title">
Choose your username
</div>

<div
id="emailBox"
class="email"
>
Loading...
</div>

<input
id="username"
class="input"
placeholder="Username"
maxlength="20"
>

<div
id="errorText"
class="error"
></div>

<button
id="saveBtn"
disabled
>
Continue
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

import {

getFirestore,
doc,
setDoc,
query,
collection,
where,
getDocs

}

from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

const firebaseConfig={

apiKey:"AIzaSyBuapWoAiZKhkNOfUos9ZuvzisS39YGs1o",
authDomain:"skibidilogin-bbf42.firebaseapp.com",
projectId:"skibidilogin-bbf42",
storageBucket:"skibidilogin-bbf42.firebasestorage.app",
messagingSenderId:"1008118855931",
appId:"1:1008118855931:web:fb7784385be188150d585e",
measurementId:"G-JJX8RGZ210"

};

const app=initializeApp(firebaseConfig);

const auth=getAuth();
const db=getFirestore();

let currentUser;

const input =
document.getElementById("username");

const error =
document.getElementById("errorText");

const button =
document.getElementById("saveBtn");

onAuthStateChanged(auth,(user)=>{

if(!user){

window.location=
"index.html";

return;

}

currentUser=user;

document.getElementById(
"emailBox"
).innerText=user.email;

document.getElementById(
"avatar"
).src=user.photoURL;

});

input.addEventListener(
"input",
async()=>{

let username=
input.value.trim();

button.disabled=true;
button.classList.remove(
"enabled"
);

error.innerText="";

if(username.length<3){

error.innerText=
"Minimum 3 characters";

return;

}

const q=query(

collection(db,"users"),

where(
"username",
"==",
username
)

);

const result=
await getDocs(q);

if(!result.empty){

error.innerText=
"This username is taken";

return;

}

button.disabled=false;

button.classList.add(
"enabled"
);

});

button.onclick=
async()=>{

await setDoc(

doc(
db,
"users",
currentUser.uid
),

{

email:
currentUser.email,

username:
input.value.trim(),

photoURL:
currentUser.photoURL

}

);

window.location=
"skibidi.html";

};

</script>

</body>
</html>
